<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <!-- ✨ FIX: apple-mobile-web-app-capable is the iOS-specific standalone
       flag — mobile-web-app-capable alone (Chrome/Android's tag) is not
       sufficient for Safari to treat a home-screen launch as a proper
       standalone app, which is part of why the icon opened to a blank
       WKWebView shell instead of the running Flutter app. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="roulinpost">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>roulinpost</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google AdSense Script -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4147720791786640"
       crossorigin="anonymous"></script>
</head>
<body>
  <!-- ✨ NEW: visible placeholder + error surface. If the bootstrap script
       throws before Flutter attaches (most commonly: a stale service-worker
       cache after a redeploy, which iOS Safari clings to more aggressively
       than desktop browsers), this now shows SOMETHING instead of a silent
       blank screen, and logs the real error to the console for diagnosis. -->
  <div id="app-loading" style="
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #0175C2; color: #fff;
      font-family: sans-serif; font-size: 14px; z-index: 9999;">
    Loading roulinpost…
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // ✨ NEW: remove the loading placeholder once Flutter actually attaches
    // to the DOM, and surface any load-time failure to the console instead
    // of it disappearing into a blank white screen.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('app-loading');
      if (el) el.remove();
    });
    window.addEventListener('error', function (e) {
      console.error('🔴 App failed to load:', e.message, e.filename, e.lineno);
    });
  </script>
</body>
</html>
